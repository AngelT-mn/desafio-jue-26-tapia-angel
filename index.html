<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatrixPro - Solucionador de Sistemas LUE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Fira+Code:wght@400;500&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }

        .matrix-input {
            @apply w-full h-12 text-center border-2 border-gray-200 rounded-lg transition-all duration-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 outline-none font-mono text-lg font-medium;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            @apply border border-white/20 shadow-xl;
        }

        .code-block {
            font-family: 'Fira Code', monospace;
            @apply bg-slate-900 text-indigo-300 p-4 rounded-xl overflow-x-auto text-sm leading-relaxed shadow-inner;
        }

        .btn-primary {
            @apply bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-8 rounded-xl transition-all active:scale-95 shadow-lg shadow-indigo-200;
        }

        .btn-secondary {
            @apply bg-white border-2 border-gray-200 hover:border-indigo-500 hover:text-indigo-600 text-gray-600 font-semibold py-3 px-6 rounded-xl transition-all;
        }
    </style>
</head>
<body class="min-h-screen py-10 px-4">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-slate-800 tracking-tight mb-3">
                Calculadora de Sistemas <span class="text-indigo-600">Matriciales</span>
            </h1>
            <p class="text-slate-500 text-lg max-w-2xl mx-auto">
                Resuelve sistemas de ecuaciones mediante descomposiciones LU (Doolittle, Crout) y Cholesky con visualización paso a paso.
            </p>
        </div>

        <!-- Controles Principales -->
        <div class="glass-card rounded-2xl p-6 mb-8 flex flex-wrap items-center justify-between gap-6">
            <div class="flex flex-wrap gap-4">
                <div class="flex flex-col">
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Dimensión (n)</label>
                    <select id="matrix-size" class="bg-gray-50 border-2 border-gray-100 rounded-lg px-4 py-2 font-semibold text-slate-700 outline-none focus:border-indigo-500" onchange="updateUI()">
                        <option value="2">2x2</option>
                        <option value="3" selected>3x3</option>
                        <option value="4">4x4</option>
                        <option value="5">5x5</option>
                        <option value="6">6x6</option>
                    </select>
                </div>
                <div class="flex flex-col">
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Método de Descomposición</label>
                    <select id="method" class="bg-gray-50 border-2 border-gray-100 rounded-lg px-4 py-2 font-semibold text-slate-700 outline-none focus:border-indigo-500">
                        <option value="doolittle">Doolittle (Lii = 1)</option>
                        <option value="crout">Crout (Uii = 1)</option>
                        <option value="cholesky">Cholesky (L = Lᵀ)</option>
                    </select>
                </div>
            </div>
            
            <div class="flex gap-3">
                <button onclick="loadExercise()" class="btn-secondary flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Cargar Ejercicio Imagen
                </button>
                <button onclick="calculate()" class="btn-primary">
                    Resolver Sistema
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Entrada de Matriz A -->
            <div class="lg:col-span-2 glass-card rounded-2xl p-8">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                        <span class="w-8 h-8 bg-indigo-100 text-indigo-600 rounded-lg flex items-center justify-center text-sm">A</span>
                        Matriz de Coeficientes
                    </h2>
                    <button onclick="fillRandom()" class="text-indigo-500 text-sm font-semibold hover:text-indigo-700">Aleatorio</button>
                </div>
                <div id="matrix-a-grid" class="grid gap-3">
                    <!-- Dinámico -->
                </div>
            </div>

            <!-- Entrada de Matriz B -->
            <div class="glass-card rounded-2xl p-8">
                <h2 class="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2">
                    <span class="w-8 h-8 bg-emerald-100 text-emerald-600 rounded-lg flex items-center justify-center text-sm">B</span>
                    Términos Independientes
                </h2>
                <div id="vector-b-grid" class="grid gap-3">
                    <!-- Dinámico -->
                </div>
            </div>
        </div>

        <!-- Alertas -->
        <div id="error-box" class="hidden mt-8 p-4 bg-red-50 border border-red-200 rounded-xl flex items-center gap-3 text-red-700">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span id="error-message"></span>
        </div>

        <!-- Sección de Resultados -->
        <div id="results-section" class="hidden mt-8 space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
            
            <!-- Solución X -->
            <div class="bg-indigo-900 rounded-2xl p-8 text-white shadow-2xl">
                <h2 class="text-2xl font-bold mb-6 flex items-center gap-3">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                    Vector Solución (X)
                </h2>
                <div id="solution-x" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4">
                    <!-- Dinámico -->
                </div>
            </div>

            <!-- Matrices L y U -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="glass-card rounded-2xl p-6">
                    <h3 id="label-l" class="text-lg font-bold text-slate-700 mb-4 uppercase tracking-widest border-b pb-2">Matriz L</h3>
                    <div id="result-l" class="code-block"></div>
                </div>
                <div class="glass-card rounded-2xl p-6">
                    <h3 id="label-u" class="text-lg font-bold text-slate-700 mb-4 uppercase tracking-widest border-b pb-2">Matriz U</h3>
                    <div id="result-u" class="code-block"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function updateUI() {
            const n = parseInt(document.getElementById('matrix-size').value);
            
            // Grid A
            const gridA = document.getElementById('matrix-a-grid');
            gridA.style.gridTemplateColumns = `repeat(${n}, minmax(0, 1fr))`;
            gridA.innerHTML = '';
            for(let i=0; i<n; i++) {
                for(let j=0; j<n; j++) {
                    gridA.innerHTML += `<input type="number" step="any" id="a-${i}-${j}" class="matrix-input" placeholder="0">`;
                }
            }

            // Grid B
            const gridB = document.getElementById('vector-b-grid');
            gridB.innerHTML = '';
            for(let i=0; i<n; i++) {
                gridB.innerHTML += `<input type="number" step="any" id="b-${i}" class="matrix-input focus:border-emerald-500 focus:ring-emerald-500/10" placeholder="0">`;
            }

            document.getElementById('results-section').classList.add('hidden');
            document.getElementById('error-box').classList.add('hidden');
        }

        function loadExercise() {
            document.getElementById('matrix-size').value = "3";
            updateUI();
            
            const A_vals = [
                [10, 2, -1],
                [-3, -6, 2],
                [1, 1, 5]
            ];
            const B_vals = [27, -61.5, -21.5];

            for(let i=0; i<3; i++) {
                for(let j=0; j<3; j++) {
                    document.getElementById(`a-${i}-${j}`).value = A_vals[i][j];
                }
                document.getElementById(`b-${i}`).value = B_vals[i];
            }
        }

        function fillRandom() {
            const n = parseInt(document.getElementById('matrix-size').value);
            for(let i=0; i<n; i++) {
                for(let j=0; j<n; j++) {
                    document.getElementById(`a-${i}-${j}`).value = Math.floor(Math.random() * 20) - 10;
                }
                document.getElementById(`b-${i}`).value = Math.floor(Math.random() * 50) - 25;
            }
        }

        function formatMatrix(m) {
            return m.map(row => row.map(v => v.toFixed(4).padStart(9)).join('  ')).join('\n');
        }

        function solveSubstitution(L, U, B, method) {
            const n = B.length;
            let y = new Array(n).fill(0);
            let x = new Array(n).fill(0);

            // Forward Substitution: Ly = B
            for (let i = 0; i < n; i++) {
                let sum = 0;
                for (let j = 0; j < i; j++) sum += L[i][j] * y[j];
                y[i] = (B[i] - sum) / L[i][i];
            }

            // Backward Substitution: Ux = y
            for (let i = n - 1; i >= 0; i--) {
                let sum = 0;
                for (let j = i + 1; j < n; j++) sum += U[i][j] * x[j];
                x[i] = (y[i] - sum) / U[i][i];
            }
            return x;
        }

        function calculate() {
            const n = parseInt(document.getElementById('matrix-size').value);
            const method = document.getElementById('method').value;
            const errorBox = document.getElementById('error-box');
            errorBox.classList.add('hidden');

            let A = [], B = [];
            try {
                for(let i=0; i<n; i++) {
                    A[i] = [];
                    for(let j=0; j<n; j++) {
                        let val = parseFloat(document.getElementById(`a-${i}-${j}`).value);
                        if(isNaN(val)) throw "Faltan valores en la Matriz A";
                        A[i][j] = val;
                    }
                    let valB = parseFloat(document.getElementById(`b-${i}`).value);
                    if(isNaN(valB)) throw "Faltan valores en el Vector B";
                    B[i] = valB;
                }
            } catch(e) {
                document.getElementById('error-message').innerText = e;
                errorBox.classList.remove('hidden');
                return;
            }

            let L = Array.from({length: n}, () => new Array(n).fill(0));
            let U = Array.from({length: n}, () => new Array(n).fill(0));

            try {
                if(method === 'doolittle') {
                    for(let i=0; i<n; i++) {
                        for(let k=i; k<n; k++) {
                            let sum = 0;
                            for(let j=0; j<i; j++) sum += (L[i][j] * U[j][k]);
                            U[i][k] = A[i][k] - sum;
                        }
                        for(let k=i; k<n; k++) {
                            if(i === k) L[i][i] = 1;
                            else {
                                let sum = 0;
                                for(let j=0; j<i; j++) sum += (L[k][j] * U[j][i]);
                                if(Math.abs(U[i][i]) < 1e-12) throw "Error: División por cero en Doolittle (pivote nulo)";
                                L[k][i] = (A[k][i] - sum) / U[i][i];
                            }
                        }
                    }
                    showResults(L, U, "Matriz L", "Matriz U", B);
                }
                else if(method === 'crout') {
                    for(let j=0; j<n; j++) {
                        for(let i=j; i<n; i++) {
                            let sum = 0;
                            for(let k=0; k<j; k++) sum += L[i][k] * U[k][j];
                            L[i][j] = A[i][j] - sum;
                        }
                        for(let i=j; i<n; i++) {
                            if(j === i) U[j][j] = 1;
                            else {
                                let sum = 0;
                                for(let k=0; k<j; k++) sum += L[j][k] * U[k][i];
                                if(Math.abs(L[j][j]) < 1e-12) throw "Error: División por cero en Crout (pivote nulo)";
                                U[j][i] = (A[j][i] - sum) / L[j][j];
                            }
                        }
                    }
                    showResults(L, U, "Matriz L", "Matriz U", B);
                }
                else if(method === 'cholesky') {
                    for(let i=0; i<n; i++) {
                        for(let j=0; j<n; j++) {
                            if(Math.abs(A[i][j] - A[j][i]) > 1e-9) throw "Cholesky requiere una matriz simétrica.";
                        }
                    }
                    for(let i=0; i<n; i++) {
                        for(let j=0; j<=i; j++) {
                            let sum = 0;
                            for(let k=0; k<j; k++) sum += L[i][k] * L[j][k];
                            if(i === j) {
                                let val = A[i][i] - sum;
                                if(val <= 0) throw "Matriz no definida positiva para Cholesky.";
                                L[i][j] = Math.sqrt(val);
                            } else {
                                L[i][j] = (A[i][j] - sum) / L[j][j];
                            }
                        }
                    }
                    const LT = L.map((_, i) => L.map(row => row[i]));
                    showResults(L, LT, "Matriz L", "Matriz Lᵀ", B);
                }
            } catch(e) {
                document.getElementById('error-message').innerText = e;
                errorBox.classList.remove('hidden');
            }
        }

        function showResults(L, U, labelL, labelU, B) {
            document.getElementById('label-l').innerText = labelL;
            document.getElementById('label-u').innerText = labelU;
            document.getElementById('result-l').innerText = formatMatrix(L);
            document.getElementById('result-u').innerText = formatMatrix(U);

            // Resolver sistema
            const X = solveSubstitution(L, U, B);
            const xDiv = document.getElementById('solution-x');
            xDiv.innerHTML = '';
            X.forEach((val, i) => {
                xDiv.innerHTML += `
                    <div class="bg-white/10 p-4 rounded-xl border border-white/20">
                        <div class="text-xs font-bold opacity-60 mb-1">X${i+1}</div>
                        <div class="text-xl font-mono font-bold">${val.toFixed(6)}</div>
                    </div>
                `;
            });

            document.getElementById('results-section').classList.remove('hidden');
            window.scrollTo({ top: document.getElementById('results-section').offsetTop - 20, behavior: 'smooth' });
        }

        window.onload = updateUI;
    </script>
</body>
</html>
